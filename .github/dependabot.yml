version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - nuget
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry*"
      aspnetcore:
        patterns:
          - "Microsoft.AspNetCore.*"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
