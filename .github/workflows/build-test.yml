name: build-test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs full history for tag resolution

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.CollectSourceInformation=true
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
          retention-days: 14

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'
          retention-days: 14

      - name: Merge coverage report
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet tool restore
          dotnet reportgenerator \
            -reports:'**/coverage.cobertura.xml' \
            -targetdir:./coverage-report \
            -reporttypes:'Cobertura;TextSummary;MarkdownSummaryGithub'
          cat ./coverage-report/Summary.txt
        shell: bash

      - name: Publish coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: cat ./coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        env:
          LINE_THRESHOLD: '40'
          BRANCH_THRESHOLD: '30'
        run: |
          LINE=$(grep -oP 'Line coverage:\s*\K[0-9.]+' ./coverage-report/Summary.txt | head -1)
          BRANCH=$(grep -oP 'Branch coverage:\s*\K[0-9.]+' ./coverage-report/Summary.txt | head -1)
          echo "Line:   ${LINE}% (threshold ${LINE_THRESHOLD}%)"
          echo "Branch: ${BRANCH}% (threshold ${BRANCH_THRESHOLD}%)"
          FAIL=0
          awk "BEGIN { exit !(${LINE:-0} < ${LINE_THRESHOLD}) }" && {
            echo "::error::Line coverage ${LINE}% below threshold ${LINE_THRESHOLD}%"; FAIL=1;
          } || true
          awk "BEGIN { exit !(${BRANCH:-0} < ${BRANCH_THRESHOLD}) }" && {
            echo "::error::Branch coverage ${BRANCH}% below threshold ${BRANCH_THRESHOLD}%"; FAIL=1;
          } || true
          exit $FAIL
        shell: bash
