name: build-test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # MinVer needs full history for tag resolution

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Audit transitive dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1 || true)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -E '\b(Critical|High)\b' >/dev/null; then
            echo "::error::Critical or High severity CVE found in dependencies"
            exit 1
          fi
          if echo "$OUTPUT" | grep -E '\b(Moderate|Medium)\b' >/dev/null; then
            echo "::warning::Moderate severity CVE found — schedule remediation"
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test (unit)
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- RunConfiguration.CollectSourceInformation=true
        shell: bash

      - name: Test (integration, ubuntu-only — Docker required)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --filter "Category=Integration" \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./TestResults
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
          retention-days: 14

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: '**/coverage.cobertura.xml'
          retention-days: 14

      - name: Merge coverage report
        if: matrix.os == 'ubuntu-latest'
        run: |
          dotnet tool restore
          dotnet reportgenerator \
            -reports:'**/coverage.cobertura.xml' \
            -targetdir:./coverage-report \
            -reporttypes:'Cobertura;TextSummary;MarkdownSummaryGithub'
          cat ./coverage-report/Summary.txt
        shell: bash

      - name: Publish coverage summary
        if: matrix.os == 'ubuntu-latest'
        run: cat ./coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        env:
          # LS-FAZ-4: regression onleyici esik. Yerel olcum (2026-04-26): line %40.7, branch %36.3.
          # Yukseltme test yazimi gerektirir — yol haritasi: docs/policies/test-coverage.md
          LINE_THRESHOLD: '40'
          BRANCH_THRESHOLD: '35'
        run: |
          LINE=$(awk '/Line coverage:/ {gsub("%",""); print $3; exit}' ./coverage-report/Summary.txt)
          BRANCH=$(awk '/Branch coverage:/ {gsub("%",""); print $3; exit}' ./coverage-report/Summary.txt)
          echo "Line:   ${LINE}% (threshold ${LINE_THRESHOLD}%)"
          echo "Branch: ${BRANCH}% (threshold ${BRANCH_THRESHOLD}%)"
          FAIL=0
          awk "BEGIN { exit !(${LINE:-0} < ${LINE_THRESHOLD}) }" && {
            echo "::error::Line coverage ${LINE}% below threshold ${LINE_THRESHOLD}%"; FAIL=1;
          } || true
          awk "BEGIN { exit !(${BRANCH:-0} < ${BRANCH_THRESHOLD}) }" && {
            echo "::error::Branch coverage ${BRANCH}% below threshold ${BRANCH_THRESHOLD}%"; FAIL=1;
          } || true
          exit $FAIL
        shell: bash
