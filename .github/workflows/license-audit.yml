name: license-audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Her Pazartesi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  audit:
    name: License Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Install nuget-license tool
        run: dotnet tool install --global nuget-license

      - name: Run license audit
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p artifacts
          # Tum lisanslari listele (whitelist'siz — false positive avoid).
          # Tool, stdout'a JSON yazar; non-zero exit code'lari (eksik metadata vb.)
          # ignore et — copyleft kontrolu asagidaki grep ile yapilir.
          nuget-license -i ./OmerkckArchitecture.sln -o JsonPretty \
            > artifacts/licenses.json || true
          echo "License report (head):"
          head -100 artifacts/licenses.json
          echo "..."
          # GPL/AGPL/LGPL/SSPL/BUSL contamination kontrolu — sadece bunlar block.
          # MIT-License, X11-License gibi kelime icinde "ML" gecen lisanslari yanlislikla
          # yakalamamak icin word-boundary kullaniliyor.
          if grep -E -i '"(licenseType|licenseUrl|License)"\s*:\s*"[^"]*\b(A?GPL|LGPL|SSPL|BUSL)\b[^"]*"' artifacts/licenses.json; then
            echo "::error::Copyleft (GPL/AGPL/LGPL/SSPL/BUSL) license found"
            exit 1
          fi
          echo "OK: no copyleft contamination detected"

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: license-report
          path: artifacts/licenses.json
          retention-days: 90
